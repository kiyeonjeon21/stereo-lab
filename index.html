    <style>
      :root { color-scheme: dark; }
      * { margin: 0; box-sizing: border-box; }
      body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; background: #0b0d10; color: #e6e6e6; overflow: hidden; }
      #nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 10;
        display: flex; gap: 2px; padding: 8px; flex-wrap: wrap;
        background: rgba(11,13,16,0.7); backdrop-filter: blur(8px);
        border-bottom: 1px solid #1c2128;
      }
      #nav a {
        padding: 4px 10px; font-size: 12px; text-decoration: none;
        color: #8b949e; border-radius: 6px; border: 1px solid transparent;
      }
      #nav a:hover { color: #e6e6e6; background: #161b22; }
      #nav a.active { color: #58a6ff; border-color: #1f6feb; background: #0d1117; }
      #app { position: fixed; inset: 0; }
      .station-message {
        position: absolute; inset: 0; display: flex; align-items: center;
        justify-content: center; flex-direction: column; gap: 12px; text-align: center;
        padding: 24px; color: #8b949e;
      }
      .station-message h1 { font-size: 18px; color: #e6e6e6; }
    </style>
